name: Daily build

# Rebuilds the site once a day so the homepage "On this day" hero reflects the
# current date. Deployment is on Netlify (platform-side, no adapter in the
# repo), so this just pings a Netlify build hook rather than building here.
#
# Setup: create a build hook in Netlify (Site configuration → Build & deploy →
# Build hooks) and store its URL as the repo secret NETLIFY_BUILD_HOOK. Also
# runnable on demand from the Actions tab.

on:
  schedule:
    - cron: "5 0 * * *" # 00:05 UTC daily, just after the date rolls over
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify build
        env:
          HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::NETLIFY_BUILD_HOOK secret is not set." >&2
            exit 1
          fi
          curl -fsS -X POST -d '{}' "$HOOK"
